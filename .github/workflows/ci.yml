name: CI

on:
  push:
  pull_request:

jobs:
  protocol-sync:
    name: Verify TS ↔ C# protocol sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
      - name: Verify MessageType sync
        run: node scripts/verify-protocol-sync.js

  broker:
    name: Broker (Node.js)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: broker/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: broker

      - name: Build (TypeScript)
        run: npm run build
        working-directory: broker

      - name: Lint
        run: npm run lint
        working-directory: broker

      - name: Tests
        run: npm test
        working-directory: broker

  dotnet:
    name: Sender + Viewer (.NET)
    runs-on: windows-2025
    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore selfdesk.slnx

      - name: Build
        run: dotnet build selfdesk.slnx --configuration Release --no-restore

      - name: Tests
        run: dotnet test selfdesk.slnx --configuration Release --no-build --logger "trx;LogFileName=results.trx"
