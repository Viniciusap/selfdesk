name: CI

on:
  push:
  pull_request:

jobs:
  protocol-sync:
    name: Verify TS ↔ C# protocol sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: lts/*
      - name: Verify MessageType sync
        run: node scripts/verify-protocol-sync.js

  broker:
    name: Broker (Node.js)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: broker/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: broker

      - name: Build (TypeScript)
        run: npm run build
        working-directory: broker

      - name: Lint
        run: npm run lint
        working-directory: broker

      - name: Tests
        run: npm test
        working-directory: broker

  dotnet:
    name: Sender + Viewer (.NET)
    runs-on: windows-2025
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup .NET 10
        uses: actions/setup-dotnet@d4c94342e560b34958eacfc5d055d21461ed1c5d # v5.0.0
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore selfdesk.slnx

      - name: Build
        run: dotnet build selfdesk.slnx --configuration Release --no-restore

      - name: Tests
        run: dotnet test selfdesk.slnx --configuration Release --no-build --logger "trx;LogFileName=results.trx"
