name: CI

on:
  push:
  pull_request:

jobs:
  protocol-sync:
    name: Verificar sync TS ↔ C# do protocolo
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
      - name: Verificar sincronização de MessageType
        run: node scripts/verify-protocol-sync.js

  broker:
    name: Broker (Node.js)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: broker/package-lock.json

      - name: Instalar dependências
        run: npm ci
        working-directory: broker

      - name: Build (TypeScript)
        run: npm run build
        working-directory: broker

      - name: Lint
        run: npm run lint
        working-directory: broker

      - name: Testes
        run: npm test
        working-directory: broker

  dotnet:
    name: Sender + Viewer (.NET)
    runs-on: windows-2025
    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore selfdesk.slnx

      - name: Build
        run: dotnet build selfdesk.slnx --configuration Release --no-restore

      - name: Testes
        run: dotnet test selfdesk.slnx --configuration Release --no-build --logger "trx;LogFileName=results.trx"

  release:
    name: Release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [broker, dotnet]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: broker/package-lock.json

      - name: Build broker
        run: npm ci && npm run build
        working-directory: broker

      - name: Empacotar broker
        run: |
          cd broker
          zip -r ../selfdesk-broker.zip dist/
          echo "Conteúdo do zip:"
          unzip -l ../selfdesk-broker.zip | tail -20

      - name: Upload broker para release
        uses: softprops/action-gh-release@v2
        with:
          files: selfdesk-broker.zip
