name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  # ── Broker: Linux tarball + Windows zip ──────────────────────────────────────
  broker:
    name: Broker (Linux tarball + Windows zip)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: broker/package-lock.json

      - name: Install all dependencies
        run: npm ci
        working-directory: broker

      - name: Compile TypeScript
        run: npm run build
        working-directory: broker

      - name: Remove devDependencies
        run: npm prune --omit=dev
        working-directory: broker

      - name: Package broker (Linux tar.gz + Windows zip)
        run: |
          mkdir -p staging/selfdesk-broker/scripts

          cp -r broker/dist broker/node_modules broker/package.json staging/selfdesk-broker/
          cp broker/.env.example staging/selfdesk-broker/

          # Linux: .sh scripts
          cp scripts/bootstrap.sh staging/selfdesk-broker/scripts/
          cp scripts/install.sh   staging/selfdesk-broker/scripts/
          chmod +x staging/selfdesk-broker/scripts/*.sh
          tar -czf selfdesk-broker-linux-x64.tar.gz -C staging selfdesk-broker

          # Windows: .ps1 scripts (same JS content, different scripts)
          cp scripts/bootstrap.ps1    staging/selfdesk-broker/scripts/
          cp scripts/install.ps1      staging/selfdesk-broker/scripts/
          cp scripts/install-broker.ps1 staging/selfdesk-broker/scripts/
          cd staging && zip -r ../selfdesk-broker-win-x64.zip selfdesk-broker

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: broker-tarball
          path: |
            selfdesk-broker-linux-x64.tar.gz
            selfdesk-broker-win-x64.zip

  # ── Sender + Viewer: Windows zips ────────────────────────────────────────────
  windows:
    name: Sender + Viewer (Windows zips)
    runs-on: windows-2025
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-dotnet@d4c94342e560b34958eacfc5d055d21461ed1c5d # v5.0.0
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore selfdesk.slnx

      - name: Publish Sender (self-contained)
        shell: pwsh
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          # S52: validate tag format before interpolating into shell commands
          if ($env:TAG_NAME -notmatch '^v\d+\.\d+\.\d+$') { throw "Invalid tag format: $env:TAG_NAME" }
          $version = $env:TAG_NAME.TrimStart('v')
          dotnet publish sender/Sender.csproj -c Release -r win-x64 --self-contained true -o sender/publish /p:Version=$version

      - name: Publish Viewer (self-contained)
        shell: pwsh
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          # S52: validate tag format before interpolating into shell commands
          if ($env:TAG_NAME -notmatch '^v\d+\.\d+\.\d+$') { throw "Invalid tag format: $env:TAG_NAME" }
          $version = $env:TAG_NAME.TrimStart('v')
          dotnet publish viewer/Viewer.csproj -c Release -r win-x64 --self-contained true -o viewer/publish /p:Version=$version

      - name: Cache FFmpeg 7.1 DLLs
        id: cache-ffmpeg
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: ffmpeg-dlls
          key: ffmpeg-7.1-win64-gpl-shared-autobuild-2026-06-07-13-55

      - name: Download FFmpeg 7.1 DLLs (BtbN shared, pinned release)
        if: steps.cache-ffmpeg.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          # S50: pinned to a specific BtbN release (not 'latest') with SHA256 verification
          $url      = 'https://github.com/BtbN/FFmpeg-Builds/releases/download/autobuild-2026-06-07-13-55/ffmpeg-n7.1.4-9-gc06af95f12-win64-gpl-shared-7.1.zip'
          $expected = '822d8abeabd79e0352c862345d10ddadb3e23c90cc874d42d1e131592b582c0e'
          Write-Host "Downloading FFmpeg..."
          Invoke-WebRequest -Uri $url -OutFile ffmpeg.zip -UseBasicParsing
          $actual = (Get-FileHash ffmpeg.zip -Algorithm SHA256).Hash.ToLower()
          if ($actual -ne $expected) { throw "FFmpeg SHA256 mismatch. Expected: $expected, Got: $actual" }
          Write-Host "SHA256 verified."
          Expand-Archive -Path ffmpeg.zip -DestinationPath ffmpeg-tmp
          $binDir = Get-ChildItem -Path ffmpeg-tmp -Recurse -Directory -Filter bin |
                    Select-Object -First 1
          if (-not $binDir) { throw "bin/ not found in FFmpeg zip." }
          New-Item -ItemType Directory -Force -Path ffmpeg-dlls | Out-Null
          Get-ChildItem $binDir.FullName -Filter '*.dll' |
            Copy-Item -Destination ffmpeg-dlls -Force
          Write-Host "Cached DLLs: $(Get-ChildItem ffmpeg-dlls -Filter *.dll | Measure-Object | Select-Object -ExpandProperty Count)"

      - name: Copy FFmpeg DLLs to publish directories
        shell: pwsh
        run: |
          $dlls = Get-ChildItem ffmpeg-dlls -Filter '*.dll'
          $dlls | Copy-Item -Destination sender/publish -Force
          $dlls | Copy-Item -Destination viewer/publish -Force
          Write-Host "Copied $($dlls.Count) DLLs."

      - name: Include scripts and examples in Sender
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path sender/publish/scripts -Force | Out-Null
          Copy-Item scripts/bootstrap.ps1      sender/publish/scripts/
          Copy-Item scripts/install.ps1        sender/publish/scripts/
          Copy-Item scripts/install-sender.ps1 sender/publish/scripts/
          Copy-Item scripts/install-task.ps1   sender/publish/scripts/
          Copy-Item scripts/install-service.ps1 sender/publish/scripts/
          Copy-Item sender/.env.example      sender/publish/

      - name: Include scripts and examples in Viewer
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path viewer/publish/scripts -Force | Out-Null
          Copy-Item scripts/bootstrap.ps1    viewer/publish/scripts/
          Copy-Item scripts/install.ps1      viewer/publish/scripts/
          Copy-Item scripts/install-viewer.ps1 viewer/publish/scripts/
          Copy-Item viewer/.env.example      viewer/publish/

      - name: Zip Sender
        shell: pwsh
        run: Compress-Archive -Path sender/publish/* -DestinationPath selfdesk-sender-win-x64.zip

      - name: Zip Viewer
        shell: pwsh
        run: Compress-Archive -Path viewer/publish/* -DestinationPath selfdesk-viewer-win-x64.zip

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: windows-zips
          path: |
            selfdesk-sender-win-x64.zip
            selfdesk-viewer-win-x64.zip

  # ── Create GitHub Release ─────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: [broker, windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: broker-tarball

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: windows-zips

      - name: Generate SHA256SUMS
        run: |
          sha256sum selfdesk-broker-linux-x64.tar.gz selfdesk-broker-win-x64.zip \
                    selfdesk-sender-win-x64.zip selfdesk-viewer-win-x64.zip > SHA256SUMS
          cat SHA256SUMS

      - name: Create release and upload artifacts
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          generate_release_notes: true
          files: |
            SHA256SUMS
            selfdesk-broker-linux-x64.tar.gz
            selfdesk-broker-win-x64.zip
            selfdesk-sender-win-x64.zip
            selfdesk-viewer-win-x64.zip
